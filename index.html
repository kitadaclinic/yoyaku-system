<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>北田内科クリニック 予約システム</title>
<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  overflow-x:hidden;
  overflow-y:auto;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#f4f6f9;
  font-size:18px;
  -webkit-text-size-adjust:100%;
  touch-action: pan-y;
}
img{max-width:100%;height:auto;display:block;}
.hero{background-size:cover;background-position:center;height:230px;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;text-align:center;padding:0 10px;}
.hero h1{margin:0;font-size:28px;font-weight:800;}
.hero h2{margin-top:8px;font-size:20px;font-weight:700;}
.container{max-width:420px;width:100%;box-sizing:border-box;margin:-35px auto 40px auto;background:white;border-radius:14px;padding:25px 20px 35px 20px;box-shadow:0 8px 25px rgba(0,0,0,0.08);}
label{display:block;margin-top:20px;font-size:18px;font-weight:700;}
input,select{width:100%;padding:16px;margin-top:8px;font-size:18px;font-weight:600;border-radius:10px;border:1.5px solid #bbb;box-sizing:border-box;background:white;}
.invalid-date{background:#ffe5e5;color:red;}
.time-buttons{display:flex;gap:10px;margin-top:10px;}
.time-buttons button{flex:1;padding:16px;min-height:50px;font-size:18px;font-weight:700;border-radius:10px;border:none;background:#e9ecef;cursor:pointer;}
.active{background:#007bff!important;color:white;}
.disabled{opacity:0.4;pointer-events:none;}
#submitBtn{width:100%;padding:18px;margin-top:30px;font-size:19px;font-weight:800;border-radius:12px;border:none;background:#0056d6;color:white;cursor:pointer;min-height:56px;}
.hidden{display:none;}
.complete{text-align:center;padding:40px 10px;word-break:break-word;overflow-wrap:break-word;}
#agreeCheck{width:26px;height:26px;}
button:disabled{background:#bfc4c9;cursor:not-allowed;}
.locked{background:#6c757d!important;}
@media(max-width:600px){.container{width:100%;max-width:100%;margin:0;border-radius:0;padding:22px 16px 30px 16px;}}<button id="loginBtn" onclick="login()"
.btn-disabled{
background:#c9c9c9;
color:#666;
pointer-events:none;
}

.btn-ready{
background:#007bff;
color:white;
}

.btn-locked{
background:#555;
color:white;
pointer-events:none;
}
</style>
</head>
<body>
<div class="hero">
<h1>Medical Smart Order</h1>
<h2>北田内科クリニック</h2>
</div>
<div class="container">
<div id="loginArea">
<label>パスワード</label>
<input type="password" id="password">

<button id="loginBtn" onclick="login()" style="margin-top:15px;padding:16px;width:100%;font-size:18px;font-weight:700;border-radius:10px;border:none;background:#007bff;color:white;min-height:50px;" disabled>ログイン</button>
</div>
<div id="formArea" class="hidden">
<form id="reservationForm">

<label>紹介コード</label><input type="text" id="referralCode" required>

<label>姓</label><input type="text" id="lastName" required>
<label>名</label><input type="text" id="firstName" required>
<label>セイ</label><input type="text" id="lastKana" required>
<label>メイ</label><input type="text" id="firstKana" required>
<label>生年月日（18歳未満は申し込みできません）</label><input type="date" id="birthDate" required>
<label>住所</label><input type="text" id="address" required>
<label>電話番号</label><input type="tel" id="phone" required>
<label>メールアドレス</label><input type="email" id="email" required>
<label>初回購入</label>
<select id="firstPurchase" required>
<option value="">選択してください</option>
<option value="true">はい</option>
<option value="false">いいえ</option>
</select>
<label>セット数（2.5mg）※初診料含みます</label><select id="setCount"></select>
<label>受取日（本日から4営業日以降）</label><input type="date" id="reservationDate" required>
<label>時間帯</label>
<div class="time-buttons">
<button type="button" id="morningBtn">午前</button>
<button type="button" id="afternoonBtn">午後</button>
</div>

<div id="importantNotice" style="margin-top:22px;font-size:17px;line-height:1.7;">
◆ マンジャロ処方前の重要確認<br>
〖 慎重な判断が必要な方 〗<br>
膵炎、甲状腺疾患（家族歴含む）、腎・肝機能障害、重度の低血糖、GLP-1薬の副作用歴、激しい胃腸障害がある方、および糖尿病薬を使用中の方。<br> 
〖 重 要 事 項 〗<br> 
• 登録は購入確定ではなく、医師の対面診察が必須です。<br> 
• 医学的判断により処方不可となる場合があります。<br> 
• 自己判断での使用・増量は重大な健康被害を招くため厳禁です。専門医の管理のもと、安全に使用してください。
</div>

<div style="margin-top:15px;display:flex;align-items:center;gap:10px;">
<input type="checkbox" id="agreeCheck">
<label for="agreeCheck" style="margin:0;font-size:18px;font-weight:700;">上記内容を確認・同意しました</label>
</div>

<button type="submit" id="submitBtn" disabled>予約する</button>
</form>
</div>
<div id="completeArea" class="complete hidden"></div>
</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbyZAVbcHORZuuavQsm9rkoARndvwtXX-hUQqUK5vIUJNB3oKg7vv9xE13bEw4RCKo05/exec";

let holidays=[];
let minDate="";
let selectedTime="";

password.addEventListener("input",function(){
if(password.value.trim()!==""){
loginBtn.disabled=false;
}else{
loginBtn.disabled=true;
}
});

function post(action,data){
return fetch(GAS_URL,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({action:action,...data})
}).then(r=>r.json());
}

function login(){
loginBtn.disabled=true;

post("authenticate",{password:password.value})
.then(res=>{
if(res===true){
loginArea.classList.add("hidden");
formArea.classList.remove("hidden");
initData();
}else{
alert("パスワードが違います");
loginBtn.disabled=false;
}
});
}

function initData(){
post("getInitialCalendarData",{}).then(data=>{
holidays=data.holidays;
minDate=data.minDate;
reservationDate.setAttribute("min",minDate);
});
post("getSetOptions",{}).then(list=>{
setCount.innerHTML="";
list.forEach(function(opt){
const o=document.createElement("option");
o.value=opt.value;
o.textContent=opt.label;
setCount.appendChild(o);
});
});
}

const requiredInputs=document.querySelectorAll("#reservationForm input[required],#reservationForm select[required]");

requiredInputs.forEach(function(el){
el.addEventListener("input",checkForm);
el.addEventListener("change",checkForm);
});

function checkForm(){
let filled=true;

requiredInputs.forEach(function(el){
if(!el.value){
filled=false;
}
});

if(!agreeCheck.checked){
filled=false;
}

if(!selectedTime){
filled=false;
}

submitBtn.disabled=!filled;
}

birthDate.addEventListener("change",function(){

const today=new Date();
const birth=new Date(this.value);

let age=today.getFullYear()-birth.getFullYear();
const m=today.getMonth()-birth.getMonth();

if(m<0 || (m===0 && today.getDate()<birth.getDate())){
age--;
}

if(age<18){
alert("18歳未満は申し込みできません");
this.value="";
}

});

reservationDate.addEventListener("change",function(){

const d=new Date(this.value);
const day=d.getDay();

if(day===0){
alert("日曜日は選択できません");
this.value="";
return;
}

if(holidays.includes(this.value)){
alert("祝日は選択できません");
this.classList.add("invalid-date");
this.value="";
return;
}else{
this.classList.remove("invalid-date");
}

if(day===3 || day===6){
afternoonBtn.classList.add("disabled");
}else{
afternoonBtn.classList.remove("disabled");
}

});

morningBtn.onclick=function(){
selectedTime="午前";
morningBtn.classList.add("active");
afternoonBtn.classList.remove("active");
checkForm();
};

afternoonBtn.onclick=function(){
if(afternoonBtn.classList.contains("disabled")){
alert("この日は午後を選択できません");
return;
}
selectedTime="午後";
afternoonBtn.classList.add("active");
morningBtn.classList.remove("active");
checkForm();
};

reservationForm.addEventListener("submit",function(e){
e.preventDefault();

submitBtn.disabled=true;
submitBtn.classList.add("locked");

if(!selectedTime){
alert("時間帯を選択してください");
return;
}

if(!agreeCheck.checked){
alert("上記内容を確認・同意してください");
return;
}

const data={
referralCode:referralCode.value,
lastName:lastName.value,
firstName:firstName.value,
lastKana:lastKana.value,
firstKana:firstKana.value,
birthDate:birthDate.value,
address:address.value,
phone:phone.value,
email:email.value,
firstPurchase:firstPurchase.value==="true",
setCount:setCount.value,
reservationDate:reservationDate.value,
time:selectedTime
};

post("submitReservation",{data:data}).then(res=>{
if(res.status==="success"){
formArea.classList.add("hidden");
completeArea.classList.remove("hidden");
completeArea.innerHTML="<h3>予約が完了しました</h3><p>予約番号："+res.reservationNumber+"</p><p>予約内容確認メールをご指定のメールアドレスに送信致しました。当日は確認メールに記載された〖予約番号〗を窓口でお伝えください</p><p>北田内科クリニック</p><button onclick=\"window.location.href='https://www.kitadaclinic.com/'\" style=\"margin-top:20px;padding:16px;width:100%;font-size:18px;font-weight:700;border-radius:10px;border:none;background:#007bff;color:white;min-height:50px;\">北田内科クリニック公式ホームページへ</button>";
}else{
alert(res.message);
submitBtn.disabled=false;
}
});

});
/* ===== フォーム入力チェック追加 ===== */

const loginBtn = document.getElementById("loginBtn");
const submitBtn = document.getElementById("submitBtn");

/* ログインボタン初期状態 */
if(loginBtn){
loginBtn.style.background="#c9c9c9";
loginBtn.disabled=true;

password.addEventListener("input",function(){

if(password.value.trim()!==""){
loginBtn.disabled=false;
loginBtn.style.background="#007bff";
}else{
loginBtn.disabled=true;
loginBtn.style.background="#c9c9c9";
}

});
}

/* 予約ボタン初期状態 */
if(submitBtn){
submitBtn.style.background="#c9c9c9";
submitBtn.disabled=true;
}

/* 入力チェック */
function checkFormComplete(){

if(
referralCode.value &&
lastName.value &&
firstName.value &&
lastKana.value &&
firstKana.value &&
birthDate.value &&
address.value &&
phone.value &&
email.value &&
firstPurchase.value &&
setCount.value &&
reservationDate.value &&
selectedTime &&
agreeCheck.checked
){
submitBtn.disabled=false;
submitBtn.style.background="#007bff";
}else{
submitBtn.disabled=true;
submitBtn.style.background="#c9c9c9";
}

}

/* 入力監視 */
[
referralCode,
lastName,
firstName,
lastKana,
firstKana,
birthDate,
address,
phone,
email,
firstPurchase,
setCount,
reservationDate,
agreeCheck
].forEach(el=>{
el.addEventListener("change",checkFormComplete);
el.addEventListener("input",checkFormComplete);
});

/* 時間選択監視 */
const originalMorning = morningBtn.onclick;
morningBtn.onclick=function(){
originalMorning.call(this);
checkFormComplete();
};

const originalAfternoon = afternoonBtn.onclick;
afternoonBtn.onclick=function(){
originalAfternoon.call(this);
checkFormComplete();
};

/* 送信後ロック */
const originalSubmit = reservationForm.onsubmit;
reservationForm.addEventListener("submit",function(){
submitBtn.disabled=true;
submitBtn.style.background="#555";
});
</script>
</body>
</html>
